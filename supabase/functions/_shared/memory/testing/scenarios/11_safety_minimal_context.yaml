{
  "id": "11_safety_minimal_context",
  "description": "Safety message should use minimal safety-first context and avoid broad profile injection.",
  "scenario_version": 1,
  "initial_state": {
    "memory_items": [
      {
        "id": "seed_safety",
        "kind": "statement",
        "content_text": "Le user a deja dit se sentir en danger pendant une crise.",
        "status": "active",
        "topic_slug": "crise_safety",
      },
      {
        "id": "seed_work",
        "kind": "fact",
        "content_text": "Le user a un entretien de travail vendredi.",
        "status": "active",
        "topic_slug": "travail",
      },
    ],
  },
  "turns": [
    {
      "user": "La je me sens en danger avec moi-meme.",
      "expect": {
        "retrieval_mode": "safety_first",
        "topic_decision": "stay",
        "created_items": [
          {
            "kind": "statement",
            "contains": ["me sens en danger"],
            "domain_keys_any_of": ["psychologie.emotions"],
            "sensitivity_level": "safety",
          },
        ],
        "payload_contains": [{ "kind": "statement", "contains": "danger" }],
        "payload_does_not_contain": [
          { "kind": "fact", "contains": "entretien" },
        ],
      },
    },
    {
      "user": "Reste avec moi juste sur les prochaines minutes.",
      "expect": {
        "retrieval_mode": "safety_first",
        "topic_decision": "stay",
        "no_extraction": true,
        "payload_does_not_contain": [
          { "kind": "fact", "contains": "vendredi" },
        ],
      },
    },
  ],
  "global_assertions": [
    {
      "no_invalid_injection": true,
      "no_deleted_in_payload": true,
      "no_statement_as_fact": true,
      "no_cross_user_data": true,
      "no_duplicate_extraction_on_retry": true,
      "no_message_double_processing": true,
    },
  ],
}
